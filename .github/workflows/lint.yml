name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck clode.sh
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
